<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>我的个人主页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            text-align: center;
            padding: 60px 20px;
            font-family: -apple-system, BlinkMacSystemFont, "微软雅黑", sans-serif;
            /* 柔和动态渐变背景 */
            background: linear-gradient(-45deg, #d4f1f4, #75e2ff, #92c9f1, #b983ff);
            background-size: 400% 400%;
            animation: softGradient 18s ease infinite;
            min-height: 100vh;
            color: #2c3e50;
        }
        @keyframes softGradient {
            0%   { background-position: 0% 50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        /* 新增：内容卡片样式 磨砂+圆角+阴影 */
        .card {
            background: rgba(255, 255, 255, 0.85);
            border-radius: 20px;
            padding: 40px 30px;
            max-width: 700px;
            margin: 0 auto;
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.15);
        }
        .avatar {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            margin: 0 auto 25px;
            object-fit: cover;
            border: 5px solid rgba(255,255,255,0.8);
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }
        h1 {
            font-size: 34px;
            margin: 15px 0;
        }
        .intro {
            font-size: 19px;
            margin: 20px 0;
            line-height: 1.6;
        }
        .hobby {
            margin: 25px 0;
            font-size: 19px;
        }
        .contact {
            margin-top: 35px;
            font-size: 19px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <!-- 所有内容放进卡片容器里 -->
    <div class="card">
        <img class="avatar" src="https://picsum.photos/300/300" alt="我的照片">
        <h1>我是时连峰</h1>
        <p class="intro">大家好！这是我亲手制作并发布的个人网页，正在学习编程和网页制作，超有成就感～</p>
        <div class="hobby">
            我的爱好：看书 | 旅行 | 听音乐 | 学习新技能
        </div>
        <div class="contact">
            邮箱：your-email@qq.com
        </div>
    </div>
</body>
</html>
