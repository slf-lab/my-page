<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人主页</title>
    <!-- 引入免费图标库（核心：让社交图标显示出来） -->
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            text-align: center;
            padding: 40px 15px;
            font-family: -apple-system, BlinkMacSystemFont, "微软雅黑", sans-serif;
            background: linear-gradient(-45deg, #d4f1f4, #75e2ff, #92c9f1, #b983ff);
            background-size: 400% 400%;
            animation: softGradient 18s ease infinite;
            min-height: 100vh;
            color: #2c3e50;
        }
        @keyframes softGradient {
            0%   { background-position: 0% 50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 头部头像 */
        .head-avatar {
            margin-bottom: 30px;
        }
        .avatar {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid rgba(255,255,255,0.8);
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }
        .name-title {
            font-size: 28px;
            margin-top: 15px;
        }

        /* 通用卡片 */
        .card {
            background: rgba(255, 255, 255, 0.85);
            border-radius: 20px;
            padding: 25px 20px;
            max-width: 600px;
            margin: 0 auto 20px;
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.15);
            transition: all 0.3s ease;
        }
        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 40px rgba(31, 38, 135, 0.25);
        }
        .card-title {
            font-size: 22px;
            margin-bottom: 15px;
            color: #3498db;
        }
        .card-text {
            font-size: 17px;
            line-height: 1.6;
        }

        /* ========== 社交图标样式 ========== */
        .social-icons {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-top: 10px;
        }
        .icon-item {
            font-size: 28px;
            transition: 0.3s;
            cursor: pointer;
        }
        /* 图标颜色 */
        .weixin { color: #07c160; }
        .qq { color: #12b7f5; }
        .email { color: #e74c3c; }
        /* 图标悬浮动效 */
        .icon-item:hover {
            transform: scale(1.2);
        }

        /* 按钮 */
        .btn {
            display: inline-block;
            margin: 15px 0 30px;
            padding: 10px 25px;
            background: #75e2ff;
            color: #2c3e50;
            text-decoration: none;
            border-radius: 30px;
            font-size: 17px;
            transition: all 0.3s ease;
        }
        .btn:hover {
            background: #92c9f1;
            transform: scale(1.05);
        }

        /* 回到顶部 */
        .back-top {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 45px;
            height: 45px;
            background: #75e2ff;
            border-radius: 50%;
            text-align: center;
            line-height: 45px;
            color: #fff;
            font-size: 20px;
            text-decoration: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>
    <!-- 头像+名字 -->
    <div class="head-avatar">
        <img class="avatar" src="https://picsum.photos/300/300" alt="我的照片">
        <h1 class="name-title">我是时连峰</h1>
    </div>

    <!-- 个人简介 -->
    <div class="card">
        <h2 class="card-title">📝 个人简介</h2>
        <p class="card-text">
            大家好！这是我亲手制作并发布的个人网页，正在学习编程与网页制作，在实践中不断成长，享受创作带来的乐趣。
        </p>
    </div>

    <!-- 兴趣爱好 -->
    <div class="card">
        <h2 class="card-title">🎯 兴趣爱好</h2>
        <p class="card-text">
            看书 | 旅行 | 听音乐 | 学习新技能 | 探索有趣的事物
        </p>
    </div>

    <!-- 个人技能 -->
    <div class="card">
        <h2 class="card-title">💡 个人技能</h2>
        <p class="card-text">
            基础网页制作、简单代码编写、图文排版、网页美化设计
        </p>
    </div>

    <!-- ========== 新增：社交联系方式卡片 ========== -->
    <div class="card">
        <h2 class="card-title">📮 联系我</h2>
        <div class="social-icons">
            <!-- 微信图标 -->
            <div class="icon-item weixin" title="微信：你的微信号">
                <i class="fa-brands fa-weixin"></i>
            </div>
            <!-- QQ图标 -->
            <div class="icon-item qq" title="QQ：376780382">
                <i class="fa-brands fa-qq"></i>
            </div>
            <!-- 邮箱图标 -->
            <div class="icon-item email" title="邮箱：shilianfeng1122@gmail.com">
                <i class="fa-solid fa-envelope"></i>
            </div>
        </div>
    </div>

    <a href="https://github.com" class="btn">访问我的github</a>
    <a href="#" class="back-top">↑</a>
</body>
</html>
