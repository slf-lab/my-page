<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>时连峰的个人主页</title>
    <style>
       * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        /* 动态渐变背景核心代码 */
        body {
            text-align: center;
            padding: 50px 20px;
            font-family: "微软雅黑", sans-serif;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            min-height: 100vh;
            color: white;
        }
        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .avatar {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            margin: 20px auto;
            object-fit: cover;
            border: 5px solid white;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
        }
        h1 {
            font-size: 32px;
            margin: 10px 0;
        }
        .intro {
            font-size: 18px;
            margin: 15px 0;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }
        .hobby {
            margin: 20px 0;
            font-size: 18px;
        }
        .contact {
            margin-top: 30px;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <!-- 圆形头像（默认是占位图，后续可以自己换） -->
    <img class="avatar" src="https://imgchr.com/i/pmm1sPg" alt="我的照片">
    
    <!-- 你的名字 -->
    <h1>时连峰</h1>
    
    <!-- 自我介绍 -->
    <p class="intro">大家好！这是我亲手制作并发布的个人网页，正在学习编程和网页制作，超有成就感～</p>
    
    <!-- 我的爱好 -->
    <div class="hobby">
        我的爱好：看书 | 旅行 | 听音乐 | 学习新技能
    </div>
    
    <!-- 联系方式 -->
    <div class="contact">
        邮箱：shilianfeng1122@gmail.com </div>
</body>
</html>
